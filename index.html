<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>English Placement Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 0;
}
.container {
  max-width: 700px;
  background: #fff;
  margin: 30px auto;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
h1, h2 {
  text-align: center;
}
.question {
  margin-bottom: 20px;
}
button {
  background: #2c7be5;
  color: white;
  border: none;
  padding: 12px;
  width: 100%;
  font-size: 16px;
  border-radius: 6px;
  cursor: pointer;
}
button:hover {
  background: #1a5fc4;
}
.result {
  text-align: center;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container" id="start">
  <!-- Logo -->
  <div style="text-align:center; margin-bottom:15px;">
    <img src="logo.png" alt="LC Logo" style="max-width:150px;">
  </div>

  <!-- LC Name -->
  <h1 style="margin-bottom:10px;">Focus Learning Center</h1>

  <p>Enter your name to begin:</p>
  <input type="text" id="studentName" style="width:100%; padding:10px;">
  <br><br>
  <button onclick="startTest()">Start Test</button>
</div>



<div class="container" id="test" style="display:none;"></div>

<div class="container" id="result" style="display:none;"></div>

<script>
const questions = [
  const questions = [
{q:"Q1. What ___ you got in your bag today?", a:["has","have","does","do"], c:1},
{q:"Q2. We eat fresh fruit with some ___ for dessert.", a:["onion","salt","butter","cream"], c:3},
{q:"Q3. Paul and Lisa ___ lunch at the moment.", a:["eat","eats","are eating","is eating"], c:2},
{q:"Q4. A ___ grows fruit and vegetables and looks after animals.", a:["customer","boss","farmer","mechanic"], c:2},
{q:"Q5. It ___ my birthday yesterday.", a:["is","was","are","were"], c:1},
{q:"Q6. Ivan usually wears a red ___ on his head.", a:["sock","jacket","jumper","cap"], c:3},
{q:"Q7. Sarah ___ to school last week.", a:["didn’t go","didn’t went","doesn’t go","doesn’t went"], c:0},
{q:"Q8. You can send a letter at the ___.", a:["supermarket","post office","museum","library"], c:1},
{q:"Q9. This is the ___ mobile phone in the shop.", a:["small","smaller","smallest","most small"], c:2},
{q:"Q10. Your ___ is your mother’s sister.", a:["cousin","aunt","uncle","grandmother"], c:1},

{q:"Q11. Sasha ___ TV when her phone rang.", a:["watched","was watching","watches","is watching"], c:1},
{q:"Q12. My friend Tony is very ___. He always makes me laugh.", a:["funny","friendly","kind","popular"], c:0},
{q:"Q13. Every home ___ a robot in the future.", a:["is having","has","will have","had"], c:2},
{q:"Q14. We studied birds and fish in our ___ lesson today.", a:["chemistry","physics","biology","maths"], c:2},
{q:"Q15. You ___ be late with your homework.", a:["must","mustn’t","don’t have to","have to"], c:1},
{q:"Q16. It’s easy to ___ this game from the internet.", a:["post","search","upload","download"], c:3},
{q:"Q17. I’ve played the guitar ___ three years.", a:["from","since","for","during"], c:2},
{q:"Q18. We ___ a great time at the party.", a:["did","were","felt","had"], c:3},
{q:"Q19. Cheese ___ from milk.", a:["is made","is make","has made","makes"], c:0},
{q:"Q20. Your ___ is between your head and your body.", a:["stomach","ear","heart","neck"], c:3},

{q:"Q21. Australia isn’t ___ Alaska.", a:["as cold","as cold as","as cold than","colder as"], c:1},
{q:"Q22. In the UK, you can’t ___ school before you are 16.", a:["get","start","leave","go to"], c:2},
{q:"Q23. There aren’t ___ places to go skateboarding.", a:["some","many","much","a few"], c:1},
{q:"Q24. Could you ___ me a favour?", a:["do","make","have","give"], c:0},
{q:"Q25. You look tired – you ___ go to bed now.", a:["should","shouldn’t","must","mustn’t"], c:0},
{q:"Q26. Keep the ___ if you want to return shoes.", a:["account","change","receipt","ticket"], c:2},
{q:"Q27. If I ___ too much coffee, I can’t sleep.", a:["am drinking","will drink","drank","drink"], c:3},
{q:"Q28. I’m ___ after running.", a:["exhausted","confused","stressed","disappointed"], c:0},
{q:"Q29. This dress ___ by an Italian company.", a:["designed","was design","was designed","has designed"], c:2},
{q:"Q30. Please ___ some juice into each glass.", a:["fill","give","pour","throw"], c:2},

{q:"Q31. It’s warm – you ___ wear a jacket.", a:["should","mustn’t","have to","don’t have to"], c:3},
{q:"Q32. We played well and ___ the other team.", a:["beat","won","passed","scored"], c:0},
{q:"Q33. We ___ to the beach three times so far.", a:["went","have been","are going","were going"], c:1},
{q:"Q34. There was a big ___ after river rose.", a:["snowstorm","forest fire","earthquake","flood"], c:3},
{q:"Q35. I ___ the match tomorrow.", a:["watch","will have watched","will watch","will be watching"], c:2},
{q:"Q36. We check ___ at airport before flight.", a:["out","off","in","up"], c:2},
{q:"Q37. The café ___ owner is from Mexico.", a:["who","which","what","whose"], c:3},
{q:"Q38. I sent her email to ___.", a:["apologise","complain","remind","remember"], c:0},
{q:"Q39. He goes to ___ his hair cut.", a:["have cut his hair","get cut his hair","have his hair cut","cut his hair"], c:2},
{q:"Q40. My mum ___ of being a writer.", a:["imagined","dreamed","encouraged","admired"], c:1},

{q:"Q41. Computers ___ at the moment.", a:["are repaired","are repairing","are be repaired","are being repaired"], c:3},
{q:"Q42. Tina puts ___ homework until Sunday.", a:["away","on","off","up"], c:2},
{q:"Q43. If people ___ cars less, pollution reduces.", a:["used","would use","had used","use"], c:0},
{q:"Q44. A tidal wave can ___ trees.", a:["erupt","knock over","fall down","collapse"], c:1},
{q:"Q45. He ___ have left the country.", a:["might","must","can’t","may"], c:2},
{q:"Q46. The guide took us ___ the Old Town.", a:["around","at","on","about"], c:0},
{q:"Q47. If you left earlier, you ___ missed train.", a:["wouldn’t","would have","wouldn’t have","didn’t"], c:2},

{q:"Q48. She showed great ___ and didn’t give up.", a:["definition","direction","decision","determination"], c:3},
{q:"Q49. The competition ___ of events.", a:["consist","consisted","consisting","consists"], c:2},
{q:"Q50. A neighbour ___ the burglary.", a:["charged","witnessed","sentenced","committed"], c:1},
{q:"Q51. I can’t get ___ it.", a:["it out of","out it of","out of it","of it out"], c:2},
{q:"Q52. Judges were impressed ___ her designs.", a:["about","of","at","by"], c:3},
{q:"Q53. We ___ getting up early.", a:["used to get","used to getting","are used to get","are used to getting"], c:3},
{q:"Q54. My dream is to ___ a difference.", a:["make","take","do","put"], c:0},
{q:"Q55. People ___ using oil in future.", a:["will be stopped","will have stopped","will have been stopping","will be stopping"], c:1},
{q:"Q56. Buy tickets ___ advance.", a:["on","at","by","in"], c:3},
{q:"Q57. Julie met the boy ___ sent email.", a:["that had","he had","which had","had"], c:0},
{q:"Q58. They fell ___ with each other.", a:["over","out","away","down"], c:1},
{q:"Q59. Abby ___ successful if she hadn’t practised.", a:["won’t be","wouldn’t be","wouldn’t have been","hadn’t been"], c:1},
{q:"Q60. The exam was very easy. It ___.", a:["was a piece of cake","broke the ice","crossed my mind","was a pain"], c:0}
];

let score = 0;

function startTest(){
  const name = document.getElementById("studentName").value;
  if(name.trim() === "") return alert("Enter your name");
  document.getElementById("start").style.display = "none";
  document.getElementById("test").style.display = "block";
  loadQuestions();
}

function loadQuestions(){
  const testDiv = document.getElementById("test");
  let html = "<h2>Answer all questions</h2>";  // start with header

  questions.forEach((q, i)=>{
    html += `<div class="question"><p>${i+1}. ${q.q}</p>`;
    q.a.forEach((opt, idx)=>{
      html += `<label><input type="radio" name="q${i}" value="${idx}"> ${opt}</label><br>`;
    });
    html += "</div>";
  });

  html += `<button onclick="finishTest()">Finish Test</button>`;
  testDiv.innerHTML = html;  // insert all at once
}


function finishTest(){
  score = 0;
  questions.forEach((q,i)=>{
    const ans = document.querySelector(`input[name="q${i}"]:checked`);
    if(ans && parseInt(ans.value) === q.c) score++;
  });

  const percent = Math.round((score / questions.length) * 100);
  let level = "Beginner";

  if(percent >= 90) level = "Upper-Intermediate";
  else if(percent >= 75) level = "Intermediate";
  else if(percent >= 55) level = "Pre-Intermediate";
  else if(percent >= 35) level = "Elementary";

  document.getElementById("test").style.display = "none";
  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML = `
    <div class="result">
      <h2>Your Result</h2>
      <p>Score: ${percent}%</p>
      <p><strong>Level: ${level}</strong></p>
    </div>`;
}
</script>

</body>
</html>
